{% extends 'base.html' %}

{% block content %}
<div class="resume-portal">
<div class="container mt-5">
    <h2 class="text-center mb-4">Upload Resume</h2>

    <div class="card p-4 shadow">
        <form method="POST" action="/analyzer/upload/" enctype="multipart/form-data">
            {% csrf_token %}

            <label class="form-label fw-bold">Choose Resume File</label>
            <input type="file" name="resumeFile" id="resumeFile" class="form-control mb-3" accept=".pdf,.doc,.docx" required>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">Upload & Parse</button>
        </form>
    </div>
</div>
</div>
{% endblock %}
