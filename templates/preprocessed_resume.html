{% extends 'base.html' %}

{% block content %}
<div class="resume-portal">
<div class="container mt-5">
    <h2 class="text-center mb-4">Preprocessed Resume Output</h2>

    <div class="card p-4 shadow">
        <h5>Cleaned Resume Text</h5>
        <textarea class="form-control" rows="15">{{ cleaned_text }}</textarea>

        <h5 class="mt-4">Preprocessing Actions Performed</h5>
        <ul>
            <li>Removed extra spaces</li>
            <li>Converted text to lowercase</li>
            <li>Prepared text for analysis</li>
        </ul>

        <div class="text-center mt-4">
            <a href="/analyzer/analysis/" class="btn btn-success">Proceed to Resume Analysis</a>
        </div>
    </div>
</div>
</div>
{% endblock %}
